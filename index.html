<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laush - Sosyal Medya Platformu</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a2e 100%);
            color: white;
            min-height: 100vh;
        }
        .hero {
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y="50" font-size="50">🦅</text></svg>') no-repeat center center;
            background-size: 200px;
            background-position: top 20%;
        }
        .logo {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #ff4444, #cc0000);
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            box-shadow: 0 20px 60px rgba(255, 68, 68, 0.4);
            margin-bottom: 40px;
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        h1 {
            font-size: 4rem;
            font-weight: 900;
            letter-spacing: 8px;
            margin-bottom: 20px;
            background: linear-gradient(90deg, #fff, #ff4444);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .tagline {
            font-size: 1.5rem;
            color: #aaa;
            margin-bottom: 60px;
        }
        .download-btn {
            padding: 20px 60px;
            font-size: 1.3rem;
            background: linear-gradient(135deg, #ff4444, #cc0000);
            border: none;
            border-radius: 50px;
            color: white;
            cursor: pointer;
            text-decoration: none;
            transition: transform 0.3s, box-shadow 0.3s;
            display: inline-block;
        }
        .download-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 20px 40px rgba(255, 68, 68, 0.5);
        }
        .features {
            display: flex;
            gap: 40px;
            margin-top: 80px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .feature {
            background: rgba(255,255,255,0.1);
            padding: 30px;
            border-radius: 20px;
            width: 250px;
        }
        .feature h3 { color: #ff4444; margin-bottom: 10px; }
        .footer {
            position: fixed;
            bottom: 20px;
            color: #666;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="hero">
        <div class="logo">🦅</div>
        <h1>LAUSH</h1>
        <p class="tagline">Türkiye'nin Yeni Sosyal Medya Platformu</p>
        
        <a href="app-debug.apk" class="download-btn">📥 APK İndir</a>
        
        <div class="features">
            <div class="feature">
                <h3>💬 DM & Tema</h3>
                <p>Kişiselleştirilmiş sohbet temaları</p>
            </div>
            <div class="feature">
                <h3>🎬 Reels</h3>
                <p>Kısa video paylaşımları</p>
            </div>
            <div class="feature">
                <h3>📝 Notlar</h3>
                <p>Düşüncelerini paylaş</p>
            </div>
            <div class="feature">
                <h3>🔒 Güvenli</h3>
                <p>Gelişmiş güvenlik sistemi</p>
            </div>
        </div>
        
        <div class="footer">
            © 2026 Laush - Atatürk'ün Gençleri
        </div>
    </div>
</body>
</html>
